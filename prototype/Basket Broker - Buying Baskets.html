<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Basket Broker — Buying Baskets</title>
  <link rel="stylesheet" href="styles.css"/>
  <script>
    // Apply theme to <html> before paint to avoid flicker.
    // Order of precedence: ?theme= URL param (parent-page override when
    // embedded) > persisted localStorage > 'dark' default.
    try {
      var params = new URLSearchParams(location.search);
      var t = params.get('theme');
      if (t !== 'dark' && t !== 'light') {
        t = localStorage.getItem('bb:theme') || 'dark';
      }
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    // When embedded in an iframe, mark the doc so styles.css can drop the
    // body background — the parent's frame then shows through and the phone
    // gets a visible outline against it.
    try {
      if (window.parent !== window) document.documentElement.classList.add('embedded');
    } catch (e) { /* cross-origin top */ }
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- iOS frame component -->
  <script type="text/babel" src="ios-frame.jsx"></script>

  <!-- Data + helpers -->
  <script type="text/babel" src="data.jsx"></script>

  <!-- UI primitives -->
  <script type="text/babel" src="ui.jsx"></script>

  <!-- Store -->
  <script type="text/babel" src="store.jsx"></script>

  <!-- Screens -->
  <script type="text/babel" src="portfolio.jsx"></script>
  <script type="text/babel" src="basket-detail.jsx"></script>
  <script type="text/babel" src="flows.jsx"></script>

  <!-- App root -->
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
